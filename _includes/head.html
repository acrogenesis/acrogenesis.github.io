<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% if page.title == 'Home' %}
  <meta name="description" content="{{ site.description }}">
  {% else %}
  <meta name="description" content="{{ page.content | strip_html | strip_newlines | truncate: 120 }}">
  {% endif %}
  <title>{% if title %}{{title}} &middot; {% endif %}{{site.title}}</title>

  <link href="//fonts.googleapis.com/css?family=Source+Sans+Pro:400,700,400italic&subset=latin,latin-ext" rel="stylesheet">
  <link href="//maxcdn.bootstrapcdn.com/font-awesome/4.2.0/css/font-awesome.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{'/assets/css/main.css' | prepend: site.baseurl}}">

  <link rel="alternate" type="application/rss+xml" title="{{site.title}}" href="/feed.xml" />
</head>
